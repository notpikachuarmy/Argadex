<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGADEX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 onclick="renderHome()" style="cursor:pointer">INICIO ARGADEX</h1>
        <div id="search-container">
            <input type="text" id="pokeSearch" onkeyup="searchPoke()" placeholder="🔍 Buscar Pokémon...">
        </div>
    </header>

    <div id="app"></div>

    <script src="pokedex.js"></script>
    <script>
        let dbHab = {}, dbMov = {};

        async function initApp() {
            const urlHab = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqOAEkDEGylIHEmPV9zLCNhAA91W_V3pevcjDGxGqjtoIsSw1M0uD0Ya4c-OyWz9PChbcJ4HHP6rB-/pub?output=csv";
            const urlMov = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSI6To38jAVH_zsa4qtGf0k1ZHhlwtqWmdBcgoYwBe4DKS6DbeNa0iWT5gljWJsSIR5CZJjKmqDIuyP/pub?output=csv";

            try {
                const [resH, resM] = await Promise.all([fetch(urlHab), fetch(urlMov)]);
                const [txtH, txtM] = await Promise.all([resH.text(), resM.text()]);
                
                txtH.split('\n').slice(1).forEach(l => { 
                    const [id, nombre, desc] = l.replace(/\r/g,'').split(','); 
                    if(id) dbHab[id.trim().toUpperCase()] = { nombre: nombre?.trim(), desc: desc?.trim() }; 
                });

                txtM.split('\n').slice(1).forEach(l => {
                    const [id, nombre, cat, tipo, pot, pre, pp, desc] = l.replace(/\r/g,'').split(',');
                    if(id) {
                        dbMov[id.trim().toUpperCase()] = { 
                            nombre: nombre?.trim(),
                            cat: cat?.trim().toLowerCase(), 
                            tipo: tipo?.trim(), 
                            pot, pre, pp, desc 
                        };
                    }
                });
                renderHome();
            } catch (e) { console.error("Error cargando base de datos", e); renderHome(); }
        }

        function searchPoke() {
            const query = document.getElementById('pokeSearch').value.toLowerCase();
            const cards = document.getElementsByClassName('card');
            for (let card of cards) {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(query) ? "block" : "none";
            }
        }

        function renderHome() {
            document.getElementById('search-container').style.display = "block";
            const container = document.getElementById('app');
            
            const pokesPrincipales = misPokes.filter(p => !p.id.toString().includes('-'));
            pokesPrincipales.sort((a,b) => a.num - b.num);

            container.innerHTML = `<div class="grid">${pokesPrincipales.map(p => `
                <div class="card" onclick="renderDetail('${p.id}')" data-name="${p.name}">
                    <img src="sprites/${p.id}.png" onerror="this.src='sprites/1.png'">
                    <p>#${p.num} <strong>${p.name}</strong></p>
                    <div class="types-row">${p.types.map(t => `<img src="tipos/${t.trim()}.png" class="type-icon">`).join('')}</div>
                </div>
            `).join('')}</div>`;
        }

        function renderDetail(id) {
            document.getElementById('search-container').style.display = "none";
            const p = misPokes.find(poke => poke.id === id);
            const container = document.getElementById('app');

            const getSmartId = (targetId) => {
                const targetBase = misPokes.find(f => f.id === targetId);
                if (!targetBase) return targetId;
                const sufijo = p.id.includes('-') ? p.id.split('-')[1] : null;
                if (!sufijo) return targetId;
                const formaCorrespondiente = misPokes.find(f => f.num === targetBase.num && f.id.endsWith('-' + sufijo));
                return formaCorrespondiente ? formaCorrespondiente.id : targetId;
            };

            const getFormName = (formId) => {
                if (!formId.includes('-')) return "Base"; 
                const sufijo = formId.split('-')[1].toLowerCase(); 
                if (sufijo === 'comida') return "Gourmet"; 
                return sufijo.charAt(0).toUpperCase() + sufijo.slice(1);
            };

            const formas = misPokes.filter(f => f.num === p.num);
            let selectorFormas = "";
            if (formas.length > 1) {
                selectorFormas = `
                    <div class="seccion" style="text-align: center; background:rgba(0,0,0,0.05); padding:15px; border-radius:10px; margin-bottom:20px;">
                        <h3 style="margin: 0 0 15px 0; border-bottom:none; font-size: 1.1em; letter-spacing: 2px;">FORMAS</h3>
                        <div style="display:flex; justify-content:center; gap:30px;">
                            ${formas.map(f => `
                                <div class="evo-unit ${f.id === p.id ? 'active-evo' : ''}" onclick="renderDetail('${f.id}')" style="cursor:pointer">
                                    <img src="sprites/${f.id}.png" style="width:60px; height:60px; object-fit:contain;">
                                    <br><small style="font-weight:bold; color:${f.id === p.id ? '#000' : '#666'}">
                                        ${getFormName(f.id)}
                                    </small>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            const buildTable = (list, hideLv = false) => {
                if(!list || list.length === 0) return "";
                return `<table>
                    <thead><tr>${hideLv ? '' : '<th>Lv</th>'}<th>Movimiento</th><th>Tipo</th><th>Cat</th></tr></thead>
                    <tbody>
                    ${list.map(m => {
                        const mData = dbMov[m.id.toUpperCase()] || { nombre: m.id, tipo: "Normal", cat: "estado" };
                        const hasStab = p.types.includes(mData.tipo);
                        return `<tr class="${hasStab ? 'stab-row' : ''}">
                            ${hideLv ? '' : `<td>${m.lv || '-'}</td>`}
                            <td class="tooltip">
                                <strong>${mData.nombre}</strong> ${hasStab ? '★' : ''}
                                <div class="tooltiptext">
                                    POD: ${mData.pot || '-'} | PRE: ${mData.pre || '-'} | PP: ${mData.pp || '-'}
                                    <hr>${mData.desc || 'Sin descripción'}
                                </div>
                            </td>
                            <td><img src="tipos/${mData.tipo ? mData.tipo.trim() : 'Normal'}.png" class="type-icon"></td>
                            <td><img src="categorias/${mData.cat || 'estado'}.png" class="cat-icon"></td>
                        </tr>`;
                    }).join('')}
                    </tbody>
                </table>`;
            };

            const habHTML = p.abilities.map(a => {
                const hData = dbHab[a.id.toUpperCase()] || { nombre: a.id, desc: "Cargando descripción..." };
                return `<div class="tooltip hab-box">
                    <strong>${a.type}:</strong> ${hData.nombre}
                    <div class="tooltiptext">${hData.desc}</div>
                </div>`;
            }).join('');

            container.innerHTML = `
                <div class="detail-view">
                    <button class="back-btn" onclick="renderHome()">⬅ Volver</button>
                    
                    <div class="header-ficha">
                        <img src="sprites/${p.id}.png" class="large-sprite">
                        <div class="ficha-info">
                            <h2>#${p.num} ${p.name}</h2>
                            <p class="category-text">Pokémon ${p.category}</p>
                            <p class="flavor-text">"${p.flavor}"</p>
                            <div class="types-row">${p.types.map(t => `<img src="tipos/${t.trim()}.png" class="type-icon">`).join('')}</div>
                        </div>
                    </div>

                    ${selectorFormas}

                    <div class="secciones-grid">
                        <div class="seccion">
                            <h3>Estadísticas Base</h3>
                            ${Object.entries(p.stats).map(([k,v]) => `
                                <div class="stat-row">
                                    <span class="stat-name">${k.toUpperCase()}</span>
                                    <span class="stat-num">${v}</span>
                                    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min((v/255)*100, 100)}%; background:${v>90?'#47d147':v>60?'#ffcc00':'#ff4d4d'}"></div></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="seccion">
                            <h3>Habilidades</h3>
                            ${habHTML}
                        </div>
                    </div>

                    <div class="seccion">
                        <h3>Línea Evolutiva</h3>
                        <div class="evo-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap;">
                            
                            ${p.evolution.prevo ? `
                                <div class="evo-unit" onclick="renderDetail('${getSmartId(p.evolution.prevo.id)}')">
                                    <img src="sprites/${getSmartId(p.evolution.prevo.id)}.png">
                                    <br><small>${p.evolution.prevo.method}</small>
                                </div>
                                <span style="font-size: 2em; color: #ccc;">➔</span>
                            ` : ''}
                            
                            <div class="evo-unit active-evo">
                                <img src="sprites/${p.id}.png">
                                <br><small>Actual</small>
                            </div>

                            ${p.evolution.evos && p.evolution.evos.length > 0 ? `
                                <span style="font-size: 2em; color: #ccc;">➔</span>
                                <div class="evo-branch" style="display: flex; flex-direction: column; gap: 15px; border-left: 2px solid #eee; padding-left: 15px;">
                                    ${p.evolution.evos.map(e => {
                                        const evoData = misPokes.find(mp => mp.id === getSmartId(e.id));
                                        return `
                                        <div class="evo-unit" onclick="renderDetail('${evoData.id}')" style="display: flex; align-items: center; gap: 10px; text-align: left; background: rgba(0,0,0,0.02); padding: 8px 15px; border-radius: 50px; cursor:pointer;">
                                            <img src="sprites/${evoData.id}.png" style="width: 50px; height: 50px; object-fit:contain;">
                                            <div>
                                                <strong style="display: block; font-size: 0.9em;">${evoData.name}</strong>
                                                <small style="color: #666;">${e.method}</small>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    ${p.credits ? `
                        <div style="text-align: center; margin-top: 10px; font-size: 0.85em; color: #777; border-top: 1px solid #eee; padding-top: 10px;">
                            ${p.credits.design ? `Diseño: <strong>${p.credits.design}</strong>` : ''}
                            ${p.credits.design && p.credits.sprite ? ' | ' : ''}
                            ${p.credits.sprite ? `Sprite: <strong>${p.credits.sprite}</strong>` : ''}
                        </div>
                    ` : ''}

                    <div class="seccion" style="margin-top: 20px;">
                        <h3>Movimientos por Nivel</h3>
                        ${buildTable(p.moves.level)}
                    </div>

                    ${p.moves.tutor && p.moves.tutor.length > 0 ? `
                        <div class="seccion" style="margin-top: 20px;">
                            <h3>Movimientos por Tutor / MT</h3>
                            ${buildTable(p.moves.tutor, true)}
                        </div>
                    ` : ''}

                    ${p.moves.egg && p.moves.egg.length > 0 ? `
                        <div class="seccion" style="margin-top: 20px;">
                            <h3>Movimientos Huevo</h3>
                            ${buildTable(p.moves.egg, true)}
                        </div>
                    ` : ''}
                </div>`;
            window.scrollTo(0,0);
        }

        initApp();
    </script>
</body>
</html>
